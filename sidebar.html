<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapsible Sidebar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Boxicons CSS -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/testcss/sidebar.css">
</head>
<body>

    <!-- Sidebar Container -->
    <nav id="sidebar" class="bg-dark d-flex flex-column vh-100 p-2 position-relative">
        <!-- Sidebar Header -->
        <div class="d-flex align-items-center mb-4 mt-2">
            <a href="#" class="d-flex align-items-center">
                <img src="img/esyatek-logo.png" alt="Logo" class="sidebar-logo me-2">
                <strong class="text-white d-none d-md-block">Metronic</strong>
            </a>
        </div>

        <!-- Sidebar Links -->
        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white d-flex align-items-center">
                    <i class="fa-solid fa-chart-simple me-2"></i> 
                    <span class="d-none d-lg-inline">Dashboard</span>
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white d-flex align-items-center">
                    <i class="fa-solid fa-user-plus me-2"></i> 
                    <span class="d-none d-lg-inline">Add Users</span>
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white d-flex align-items-center">
                    <i class="fa-solid fa-users-gear me-2"></i> 
                    <span class="d-none d-lg-inline">Manage Users</span>
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="#" class="nav-link text-white d-flex align-items-center">
                    <i class="fa-solid fa-user-gear me-2"></i> 
                    <span class="d-none d-lg-inline">Manage Admins</span>
                </a>
            </li>
        </ul>

        <!-- Sidebar Toggle Button (Top-Right Positioned) -->
        <div class="sidebar-toggle position-absolute">
            <i class='bx bxs-arrow-to-right'></i>
            <i class="fa-solid fa-lock d-none"></i>
        </div>
    </nav>

    <!-- Page Content -->
    <div id="content" class="p-4">
        <h2>Main Content</h2>
        <p>This is the main content area. The sidebar width matches Metronic's sidebar.</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://kit.fontawesome.com/29c04b1733.js" defer crossorigin="anonymous"></script>
    <script src="assets/testjs/sidebar.js" defer></script>

</body>
</html>
